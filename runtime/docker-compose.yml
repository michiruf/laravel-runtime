services:
    laravel.test:
        build:
            context: ./sail
            dockerfile: Dockerfile
            args:
                PHP_VERSION: '${PHP_VERSION:-8.4}'
                SAIL_INSTALL_CLAUDE_CODE: '${SAIL_INSTALL_CLAUDE_CODE:-false}'
                SAIL_INSTALL_GEMINI_CLI: '${SAIL_INSTALL_GEMINI_CLI:-false}'
                SAIL_INSTALL_PAPLAY: '${SAIL_INSTALL_PAPLAY:-false}'
                SAIL_INSTALL_PDFTOTEXT: '${SAIL_INSTALL_PDFTOTEXT:-false}'
        image: php-runtime-${PHP_VERSION:-8.4}/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        expose:
            - '80'
        environment:
            VIRTUAL_HOST: ${PROJECT_NAME}.local
            WWWUSER: 1000
            LARAVEL_SAIL: 1
            XDEBUG_MODE: 'debug,coverage'
            XDEBUG_CONFIG: 'client_host=host.docker.internal'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '${PROJECT_PATH}:/var/www/html'
            # Composer auth (optional)
            #- '~/.config/composer/auth.json:/home/sail/.config/composer/auth.json'
            # Claude state (mount if INSTALL_CLAUDE_CODE=true)
            #- '~/.claude.json:/home/sail/.claude.json'
            #- '~/.claude.json.backup:/home/sail/.claude.json.backup'
            #- '~/.claude/:/home/sail/.claude/'
            # Gemini state (mount if INSTALL_GEMINI_CLI=true)
            #- '~/.gemini/:/home/sail/.gemini/'
        networks:
            - sail
            - proxy
        depends_on:
            - mysql
            - redis
        restart: unless-stopped
    mysql:
        image: 'mysql/mysql-server:8.0'
        ports:
            - '33006:3306'
        expose:
            - '3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_CREATE_TEST_DATABASE: '${MYSQL_CREATE_TEST_DATABASE:-true}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - '${LARAVEL_RUNTIME_DIRECTORY}/runtime/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 3
            timeout: 5s
        restart: unless-stopped
    redis:
        image: 'redis:alpine'
        expose:
            - '6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
        restart: unless-stopped
    mailpit:
        image: 'axllent/mailpit:latest'
        expose:
            - '1025'
            - '8025'
        environment:
            VIRTUAL_HOST: mail.${PROJECT_NAME}.local
            VIRTUAL_PORT: 8025
        networks:
            - sail
            - proxy

networks:
    sail:
        driver: bridge
    proxy:
        external: true

volumes:
    sail-mysql:
        driver: local
        driver_opts:
            type: tmpfs
            device: tmpfs
    sail-redis:
        driver: local
        driver_opts:
            type: tmpfs
            device: tmpfs

services:
    mailpit:
        image: 'axllent/mailpit:latest'
        expose:
            - '1025'
            - '8025'
        environment:
            VIRTUAL_HOST: mail.${PROJECT_NAME}.local
            VIRTUAL_PORT: 8025
        networks:
            - sail
            - proxy

networks:
    sail:
        driver: bridge
    proxy:
        external: true
